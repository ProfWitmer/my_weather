services:
  - type: web
    name: my-weather-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: my-weather-db
          property: connectionString

databases:
  - name: my-weather-db
    databaseName: weather
    user: weather_user
